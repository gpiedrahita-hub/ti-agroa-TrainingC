name: CI

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - "infinite-herbs-frontend/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infinite-herbs-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: infinite-herbs-frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run test:e2e
      - run: npm run build
